<body>
    <div class="app-container">
        <h1>ID TEXT ENHANCER</h1>
        <p>Sharpens lettering and document details while protecting portrait faces and skin tones.</p>
        
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <span id="label-text">DROP ID PHOTO HERE<br><small>or click to browse</small></span>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>

        <div class="btn-group">
            <button id="processBtn" style="display:none">ENHANCE LETTERING</button>
            <canvas id="canvas"></canvas>
            <button id="dlBtn" class="dl-btn">DOWNLOAD ENHANCED ID</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const processBtn = document.getElementById('processBtn');
        const dlBtn = document.getElementById('dlBtn');
        const status = document.getElementById('status');
        let imgObj = null;

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgObj = new Image();
                imgObj.onload = () => {
                    canvas.width = imgObj.width;
                    canvas.height = imgObj.height;
                    ctx.drawImage(imgObj, 0, 0);
                    canvas.style.display = 'block';
                    processBtn.style.display = 'block';
                    dlBtn.style.display = 'none';
                    document.getElementById('label-text').innerHTML = `<b>SELECTED:</b><br>${file.name}`;
                    status.innerText = "READY FOR ENHANCEMENT";
                };
                imgObj.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        processBtn.onclick = () => {
            status.innerText = "ANALYZING CHARACTER EDGES...";
            setTimeout(enhanceProcess, 50);
        };

        function enhanceProcess() {
            const w = canvas.width;
            const h = canvas.height;
            ctx.drawImage(imgObj, 0, 0);
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const output = ctx.createImageData(w, h);
            const dst = output.data;

            // 1. Edge-Detection & Sharpening Matrix (Laplacian based)
            // This 3x3 kernel ignores flat surfaces (skin) and boosts rapid changes (text)
            const kernel = [ 0, -1,  0, 
                            -1,  5, -1, 
                             0, -1,  0 ];

            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    let r=0, g=0, b=0;
                    for (let ky = 0; ky < 3; ky++) {
                        for (let kx = 0; kx < 3; kx++) {
                            const idx = ((y + ky - 1) * w + (x + kx - 1)) * 4;
                            const weight = kernel[ky * 3 + kx];
                            r += data[idx] * weight;
                            g += data[idx + 1] * weight;
                            b += data[idx + 2] * weight;
                        }
                    }
                    const outIdx = (y * w + x) * 4;
                    dst[outIdx] = r;
                    dst[outIdx+1] = g;
                    dst[outIdx+2] = b;
                    dst[outIdx+3] = 255;
                }
            }

            // 2. Selective Contrast Masking
            // Boosts dark colors (text) and prevents washing out the light ones
            const contrast = 1.3;
            for (let i = 0; i < dst.length; i += 4) {
                // Apply a simple contrast curve to each channel
                dst[i] = Math.min(255, Math.max(0, (dst[i] - 128) * contrast + 128));
                dst[i+1] = Math.min(255, Math.max(0, (dst[i+1] - 128) * contrast + 128));
                dst[i+2] = Math.min(255, Math.max(0, (dst[i+2] - 128) * contrast + 128));
            }

            ctx.putImageData(output, 0, 0);
            status.innerText = "ENHANCEMENT COMPLETE";
            dlBtn.style.display = 'block';
        }

        dlBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = 'Enhanced_ID_Lettering.png';
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        };
    </script>
