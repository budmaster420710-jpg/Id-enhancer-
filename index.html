<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | ID Forensic Lab</title>
    <style>
        :root { --neon: #7aa2f7; --bg: #1a1b26; --panel: #24283b; --text: #c0caf5; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .lab-container { background: var(--panel); border: 1px solid #414868; padding: 25px; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 600px; }
        h1 { color: var(--neon); font-size: 1.1rem; margin: 0 0 20px 0; border-bottom: 1px solid #414868; padding-bottom: 10px; letter-spacing: 2px; text-align: center; }
        canvas { width: 100%; height: auto; border-radius: 4px; margin-top: 20px; border: 1px solid #16161e; background: #000; }
        .ui-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .control-group { background: #16161e; padding: 10px; border-radius: 6px; border: 1px solid #414868; }
        label { display: block; font-size: 0.7rem; color: #565f89; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--neon); cursor: pointer; }
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-family: inherit; transition: 0.2s; text-transform: uppercase; }
        .btn-load { background: var(--neon); color: #1a1b26; }
        .btn-save { background: #9ece6a; color: #1a1b26; }
        .status-bar { margin-top: 15px; font-size: 0.7rem; color: #414868; text-align: left; border-top: 1px solid #414868; padding-top: 10px; }
    </style>
</head>
