<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID_STATION | FORENSIC_PRO_V8</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d0e14; --panel: #16161e; --text: #a9b1d6; }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* LEFT SIDE: TOOLS */
        .sidebar { 
            width: 350px; background: var(--panel); border-right: 2px solid #24283b;
            display: flex; flex-direction: column; padding: 25px; overflow-y: auto;
        }
        h1 { color: var(--neon); font-size: 0.75rem; margin: 0 0 25px 0; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .mod { background: #1a1b26; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #2f334d; }
        label { display: flex; justify-content: space-between; font-size: 0.65rem; color: #565f89; margin-bottom: 10px; text-transform: uppercase; }
        label span { color: var(--neon); font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--neon); cursor: pointer; }

        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; 
            cursor: pointer; font-family: inherit; text-transform: uppercase; font-size: 0.75rem;
            margin-bottom: 10px; transition: 0.2s;
        }
        .btn-load { background: #414868; color: white; }
        .btn-save { background: var(--neon); color: #0b0b10; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* RIGHT SIDE: THE ACTUAL VIEWER */
        .viewer-container { 
            flex: 1; background: #050505; position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: auto; padding: 40px;
        }
        #view { 
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                              linear-gradient(-45deg, #111 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #111 75%), 
                              linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 1px solid #333;
            max-width: 100%;
            display: none; /* Hidden until image loads */
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        #placeholder { color: #333; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h1>[ TEXT_ISOLATION_LAB ]</h1>
    
    <input type="file" id="fileIn" style="display:none" accept="image/*">
    <button class="btn btn-load" onclick="document.getElementById('fileIn').click()">1. Select ID Photo</button>

    <div class="mod">
        <label>Ink Contrast <span id="v-ink">1.0</span></label>
        <input type="range" id="ink" min="1" max="4" step="0.1" value="1">
    </div>

    <div class="mod">
        <label>Face Protection <span id="v-protect">Max</span></label>
        <input type="range" id="protect" min="0" max="1" step="0.05" value="1">
    </div>

    <div class="mod">
        <label>Text Sharpen <span id="v-edge">0</span></label>
        <input type="range" id="edge" min="0" max="100" value="0">
    </div>

    <div class="mod">
        <label>Brightness <span id="v-bright">0</span></label>
        <input type="range" id="bright" min="-100" max="100" value="0">
    </div>

    <button class="btn btn-save" onclick="exportFinal()">2. Export Result</button>
</aside>

<main class="viewer-container">
    <div id="placeholder">NO SOURCE DETECTED</div>
    <canvas id="view"></canvas>
</main>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let originalData = null;

    document.getElementById('fileIn').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = () => {
                // Ensure visibility
                document.getElementById('placeholder').style.display = 'none';
                canvas.style.display = 'block';

                // Set internal resolution
                const maxDim = 1800;
                let w = img.width, h = img.height;
                if (w > maxDim) { h *= maxDim/w; w = maxDim; }
                
                canvas.width = w;
                canvas.height = h;
                
                // Draw and Save
                ctx.drawImage(img, 0, 0, w, h);
                originalData = ctx.getImageData(0, 0, w, h);
                process();
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    function process() {
        if (!originalData) return;

        const ink = parseFloat(document.getElementById('ink').value);
        const prot = parseFloat(document.getElementById('protect').value);
        const edge = parseInt(document.getElementById('edge').value);
        const bright = parseInt(document.getElementById('bright').value);

        // UI Updates
        document.getElementById('v-ink').innerText = ink.toFixed(1);
        document.getElementById('v-edge').innerText = edge;
        document.getElementById('v-bright').innerText = bright;

        const buffer = new ImageData(new Uint8ClampedArray(originalData.data), canvas.width, canvas.height);
        const d = buffer.data;

        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i+1], b = d[i+2];

            // 1. Skin Detection (Face Protection)
            const sum = r + g + b;
            const nr = r / sum, ng = g / sum;
            const isSkin = (nr > 0.33 && nr < 0.52 && ng > 0.28 && ng < 0.39);

            // 2. Grayscale/Luma conversion
            let gray = 0.299*r + 0.587*g + 0.114*b;
            gray += bright;

            if (!isSkin) {
                // Apply Heavy Text Isolation
                let v = Math.pow(Math.max(0, gray) / 255, ink) * 255;
                d[i] = d[i+1] = d[i+2] = Math.min(255, v);
            } else {
                // Blend protection
                d[i] = (r * prot) + (gray * (1 - prot));
                d[i+1] = (g * prot) + (gray * (1 - prot));
                d[i+2] = (b * prot) + (gray * (1 - prot));
            }
        }

        ctx.putImageData(buffer, 0, 0);

        // 3. Final Edge Overlay
        if (edge > 0) {
            ctx.globalCompositeOperation = 'overlay';
            ctx.filter = `contrast(${100 + edge}%) brightness(95%)`;
            ctx.drawImage(canvas, 0, 0);
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = 'none';
        }
    }

    // Input listeners
    ['ink', 'protect', 'edge', 'bright'].forEach(id => {
        document.getElementById(id).oninput = process;
    });

    function exportFinal() {
        if (!originalData) return;
        const link = document.createElement('a');
        link.download = `VERIFIED_TEXT_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }
</script>
</body>
</html>
