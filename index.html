<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID_STATION | SMART_ISOLATION_V6</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0b10; --panel: #16161e; --text: #787c99; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .frame { background: var(--panel); border: 1px solid #24283b; padding: 20px; border-radius: 12px; width: 95%; max-width: 1000px; box-shadow: 0 10px 40px #000; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #24283b; padding-bottom: 10px; }
        h1 { color: var(--neon); font-size: 0.8rem; margin: 0; letter-spacing: 2px; }
        
        .main-grid { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
        .control-panel { display: flex; flex-direction: column; gap: 15px; }
        .mod { background: #1a1b26; padding: 12px; border-radius: 6px; border: 1px solid #2f334d; }
        label { display: block; font-size: 0.6rem; margin-bottom: 8px; color: #565f89; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--neon); }
        
        canvas { width: 100%; border-radius: 4px; background: #000; cursor: crosshair; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 0.7rem; }
        .btn-in { background: #414868; color: #fff; }
        .btn-out { background: var(--neon); color: #0b0b10; }
        .badge { background: #f7768e; color: #000; padding: 2px 5px; font-size: 0.5rem; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="frame">
    <div class="header">
        <h1>CODY_ARCH: TEXT_PRO_ISOLATION <span class="badge">FACE PROTECT ACTIVE</span></h1>
        <div id="status" style="font-size: 0.6rem;">IDLE</div>
    </div>

    <div class="main-grid">
        <aside class="control-panel">
            <div class="mod">
                <label>Text Ink Intensity</label>
                <input type="range" id="ink" min="0" max="100" value="0">
            </div>
            <div class="mod">
                <label>OCR Edge Sharpen</label>
                <input type="range" id="edge" min="0" max="100" value="0">
            </div>
            <div class="mod">
                <label>Face/Skin Protection</label>
                <input type="range" id="protect" min="0" max="100" value="85">
            </div>
            <div class="mod">
                <label>Glint Suppression</label>
                <input type="range" id="glint" min="0" max="100" value="20">
            </div>
            
            <input type="file" id="fileIn" style="display:none" accept="image/*">
            <button class="btn btn-in" onclick="document.getElementById('fileIn').click()">Import Document</button>
            <button class="btn btn-out" onclick="exportFinal()">Save Forensic Copy</button>
        </aside>

        <div class="viewer">
            <canvas id="view"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let originalData = null;

    document.getElementById('fileIn').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = () => {
                const scale = Math.min(1800 / img.width, 1);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                process();
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function process() {
        if (!originalData) return;

        const ink = document.getElementById('ink').value / 50;
        const edge = document.getElementById('edge').value / 25;
        const protect = document.getElementById('protect').value / 100;
        const glint = document.getElementById('glint').value / 100;

        const buffer = new ImageData(new Uint8ClampedArray(originalData.data), canvas.width, canvas.height);
        const d = buffer.data;

        for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g = d[i+1], b = d[i+2];
            
            // 1. SKIN DETECTION LOGIC (Normalized Chromaticity)
            // Human skin usually falls in this ratio regardless of race
            const sum = r + g + b;
            const nr = r / sum;
            const ng = g / sum;
            const isSkin = (nr > 0.35 && nr < 0.55 && ng > 0.25 && ng < 0.4);
            
            // 2. TEXT LUMINANCE (Weighted)
            let lum = 0.299*r + 0.587*g + 0.114*b;
            
            // 3. TARGETED PROCESSING
            // If it's NOT skin, apply the forensic filter
            if (!isSkin || protect < 0.5) {
                // Ink Extraction: Darken lower ranges, preserve upper
                let factor = Math.pow(lum / 255, 1 + ink);
                let v = factor * 255;

                // Glint Suppression: Cap the peaks
                if (v > 220) v -= (v - 220) * glint;

                // Apply protection blending
                const blend = 1 - protect;
                d[i] = r * protect + v * blend;
                d[i+1] = g * protect + v * blend;
                d[i+2] = b * protect + v * blend;
            }
        }

        ctx.putImageData(buffer, 0, 0);

        // 4. EDGE SHARPENING PASS (Only on Text regions)
        if (edge > 0) {
            ctx.globalCompositeOperation = 'overlay';
            ctx.filter = `contrast(150%) brightness(90%) blur(0.5px)`;
            ctx.drawImage(canvas, 0, 0);
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = `none`;
        }
        
        document.getElementById('status').innerText = "V6_SHARP_ACTIVE";
    }

    ['ink', 'edge', 'protect', 'glint'].forEach(id => {
        document.getElementById(id).oninput = process;
    });

    function exportFinal() {
        const link = document.createElement('a');
        link.download = `VERIFIED_TEXT_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }
</script>
</body>
</html>
