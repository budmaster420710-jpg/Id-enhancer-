<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID_TEXT_STATION_V9</title>
    <style>
        :root { --neon: #00ffcc; --panel: rgba(20, 20, 30, 0.95); }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050505; color: #fff; font-family: monospace;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* THE VIEWER: FORCED VISIBILITY */
        #viewport {
            flex: 1; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: auto;
        }
        canvas { 
            box-shadow: 0 0 100px #000; 
            max-width: 95%; max-height: 95%;
            border: 2px solid #333;
            display: none; /* Triggered by JS */
        }

        /* THE CONTROL OVERLAY */
        .ui-overlay {
            position: absolute; left: 20px; top: 20px;
            width: 300px; background: var(--panel);
            padding: 20px; border-radius: 10px; border: 1px solid #444;
            backdrop-filter: blur(10px); z-index: 100;
        }
        .mod { margin-bottom: 15px; }
        label { font-size: 10px; color: var(--neon); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--neon); }
        
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            margin-bottom: 8px; font-family: inherit;
        }
        .btn-load { background: #fff; color: #000; }
        .btn-save { background: var(--neon); color: #000; }
        
        #status { font-size: 9px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="ui-overlay">
    <b style="font-size: 12px; display: block; margin-bottom: 15px; letter-spacing: 2px;">TEXT_ISOLATOR_V9</b>
    
    <button class="btn btn-load" onclick="document.getElementById('fileIn').click()">Upload ID Photo</button>
    <input type="file" id="fileIn" style="display:none" accept="image/*">

    <div class="mod">
        <label>Ink Punch (OCR Focus)</label>
        <input type="range" id="ink" min="1" max="5" step="0.1" value="1.5">
    </div>

    <div class="mod">
        <label>Text Edge Sharpness</label>
        <input type="range" id="edge" min="0" max="5" step="0.5" value="0">
    </div>

    <div class="mod">
        <label>Portrait Protection</label>
        <input type="range" id="protect" min="0" max="1" step="0.1" value="0.9">
    </div>

    <button class="btn btn-save" onclick="exportFinal()">Export Forensic PNG</button>
    <div id="status">Awaiting source file...</div>
</div>

<div id="viewport">
    <canvas id="view"></canvas>
</div>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let original = null;

    document.getElementById('fileIn').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = () => {
                // Ensure canvas is visible
                canvas.style.display = 'block';
                
                // Maximize resolution for text clarity
                const scale = Math.min(2200 / img.width, 1);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                original = ctx.getImageData(0, 0, canvas.width, canvas.height);
                document.getElementById('status').innerText = "LIVE_SOURCE: " + canvas.width + "px";
                process();
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    function process() {
        if (!original) return;

        const ink = parseFloat(document.getElementById('ink').value);
        const edge = parseFloat(document.getElementById('edge').value);
        const prot = parseFloat(document.getElementById('protect').value);

        const buffer = new ImageData(new Uint8ClampedArray(original.data), canvas.width, canvas.height);
        const data = buffer.data;

        for (let i = 0; i < data.length; i += 4) {
            let r = data[i], g = data[i+1], b = data[i+2];

            // 1. SKIN DETECTION
            const sum = r + g + b;
            const nr = r / sum, ng = g / sum;
            const isSkin = (nr > 0.33 && nr < 0.52 && ng > 0.28 && ng < 0.39);

            // 2. TEXT ISOLATION (Luma Power Curve)
            let gray = 0.299*r + 0.587*g + 0.114*b;
            
            if (!isSkin) {
                // This makes the text "pop" from the ID background
                let v = Math.pow(gray / 255, ink) * 255;
                data[i] = data[i+1] = data[i+2] = v;
            } else {
                // Leave the portrait alone based on protection slider
                data[i] = (r * prot) + (gray * (1-prot));
                data[i+1] = (g * prot) + (gray * (1-prot));
                data[i+2] = (b * prot) + (gray * (1-prot));
            }
        }
        ctx.putImageData(buffer, 0, 0);

        // 3. TEXT-SPECIFIC SHARPENING (Convolution)
        if (edge > 0) {
            applySharpen(edge);
        }
    }

    function applySharpen(strength) {
        const w = canvas.width;
        const h = canvas.height;
        const weights = [0, -strength, 0, -strength, 1 + (strength * 4), -strength, 0, -strength, 0];
        const input = ctx.getImageData(0, 0, w, h);
        const output = ctx.createImageData(w, h);
        
        for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
                let r = 0, g = 0, b = 0;
                for (let ky = 0; ky < 3; ky++) {
                    for (let kx = 0; kx < 3; kx++) {
                        const idx = ((y + ky - 1) * w + (x + kx - 1)) * 4;
                        r += input.data[idx] * weights[ky * 3 + kx];
                        g += input.data[idx+1] * weights[ky * 3 + kx];
                        b += input.data[idx+2] * weights[ky * 3 + kx];
                    }
                }
                const resIdx = (y * w + x) * 4;
                output.data[resIdx] = r;
                output.data[resIdx+1] = g;
                output.data[resIdx+2] = b;
                output.data[resIdx+3] = 255;
            }
        }
        ctx.putImageData(output, 0, 0);
    }

    ['ink', 'edge', 'protect'].forEach(id => {
        document.getElementById(id).oninput = process;
    });

    function exportFinal() {
        if (!original) return;
        const link = document.createElement('a');
        link.download = `FIN_ID_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }
</script>
</body>
</html>
